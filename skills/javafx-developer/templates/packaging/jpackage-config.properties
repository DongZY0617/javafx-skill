# ============================================================
# jpackage configuration for {{appName}}
# ============================================================
# This file provides configuration values that are parsed by build
# scripts and passed to the jpackage command to build native
# installers/images.
# Replace the {{...}} placeholders during code generation.
# ============================================================

# --- Prerequisite steps ---
# Before running jpackage, copy dependencies into target/libs:
#   mvn dependency:copy-dependencies -DoutputDirectory=target/libs
# Also ensure the application main jar is built (mvn package).

# --- Application metadata ---
app.name={{appName}}
app.version={{appVersion}}
app.vendor={{appVendor}}

# --- Main entry point ---
main.class={{mainClass}}
main.jar={{artifactId}}-{{version}}.jar

# --- Input / output ---
input.dir=target/libs
output.dir=target/dist

# --- Resources ---
# Icon paths are platform-specific (build scripts select the matching file):
#   Windows: src/main/resources/icons/app-icon.ico
#   macOS:   src/main/resources/icons/app-icon.icns (also supports .png)
#   Linux:   src/main/resources/icons/app-icon.png
icon.path=src/main/resources/icons/app-icon

# --- Java runtime options ---
java.options=--enable-native-access=javafx.graphics

# --- Windows packaging ---
win.type=exe
win.menu=true
win.shortcut=true
win.per.user.install=true

# --- macOS packaging ---
mac.type=dmg
mac.sign=false
mac.package-name={{appName}}

# --- Linux packaging ---
linux.type=deb
linux.menu-group=Utility
linux.shortcut=true
