# ============================================================
# jpackage configuration for ${appName}
# ============================================================
# This file provides configuration values consumed by the
# jpackage tool to build native installers/images.
# Replace the ${...} placeholders during code generation.
# ============================================================

# --- Application metadata ---
app.name=${appName}
app.version=${appVersion}
app.vendor=${appVendor}

# --- Main entry point ---
main.class=${mainClass}
main.jar=${artifactId}-${version}.jar

# --- Input / output ---
input.dir=target/libs
output.dir=target/dist

# --- Resources ---
icon.path=src/main/resources/icons/app-icon

# --- Java runtime options ---
java.options=--enable-native-access=javafx.graphics

# --- Windows packaging ---
win.type=exe
win.menu=true
win.shortcut=true
win.per.user.install=true

# --- macOS packaging ---
mac.type=dmg
mac.sign=false
mac.package-name=${appName}

# --- Linux packaging ---
linux.type=deb
linux.menu-group=Utility
linux.shortcut=true
